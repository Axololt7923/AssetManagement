<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Assets - Asset Management</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background-color: #f4f4f4; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .search-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
        .form-group input, .form-group select { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 0.6rem 1rem; background-color: #28a745; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 1rem; }
        .btn:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        table th, table td { padding: 0.75rem; border: 1px solid #ddd; text-align: left; }
        table th { background-color: #f8f9fa; color: #666; font-weight: 600; }
        .logout { float: right; color: #007bff; text-decoration: none; font-size: 0.9rem; }
        .logout:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/login}" class="logout">Logout</a>
        <h2>Asset Search</h2>
        
        <form class="search-form" method="get" th:action="@{/assets}">
            <div class="form-group">
                <label for="assetName">Name</label>
                <input type="text" id="assetName" name="assetName" th:value="${assetName}" placeholder="Search by name...">
            </div>
            <div class="form-group">
                <label for="assetType">Type</label>
                <select id="assetType" name="assetType">
                    <option value="">All Types</option>
                    <option value="electronic" th:selected="${assetType == 'electronic'}">Electronic</option>
                    <option value="furniture" th:selected="${assetType == 'furniture'}">Furniture</option>
                </select>
            </div>
            <button type="submit" class="btn">Search</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Price</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="asset : ${assets}">
                    <td th:text="${asset.name}">Asset Name</td>
                    <td th:text="${asset.type}">Asset Type</td>
                    <td th:text="${asset.price}">Price</td>
                    <td th:text="${asset.description}">Description</td>
                </tr>
                <tr th:if="${#lists.isEmpty(assets)}">
                    <td colspan="4" style="text-align: center;">No assets found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
