spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:assets-storage}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformTransactionManager
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: AssetManagement
server:
  port: 8080